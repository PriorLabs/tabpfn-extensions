name: In pull request
on:
  pull_request:
    branches:
      - main
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: pr-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check_python_linting:
    name: Ruff Linting & Formatting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: astral-sh/ruff-action@0ce1b0bf8b818ef400413f810f8a11cdbda0034b # v4.0.0
        with:
          src: "./src ./tests"
          version-file: pyproject.toml
      - uses: astral-sh/ruff-action@0ce1b0bf8b818ef400413f810f8a11cdbda0034b # v4.0.0
        with:
          src: "./src ./tests"
          version-file: pyproject.toml
          args: "format --check"

  test_compatibility:
    name: Test Package Compatibility
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            python-version: "3.9"
            dependency-set: lowest-direct
          - os: macos-15-intel # We need x86 as ARM is  python>= 3.11 only.
            # https://github.com/actions/setup-python/issues/855
            python-version: "3.9"
            dependency-set: lowest-direct
          - os: windows-latest
            python-version: "3.9"
            dependency-set: lowest-direct
          - os: ubuntu-latest
            python-version: "3.13"
            dependency-set: highest
          - os: macos-latest
            python-version: "3.13"
            dependency-set: highest
          - os: windows-latest
            python-version: "3.13"
            dependency-set: highest
    runs-on: ${{ matrix.os }}

    env:
      TABPFN_MODEL_CACHE_DIR: ${{ github.workspace }}/model_cache

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}
          architecture: x64

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --all-extras --group ci --resolution ${{ matrix.dependency-set }}

      - name: Restore model cache
        id: restore-model-cache
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ github.workspace }}/model_cache
          # This cache read will always fail as the model_cache directory is empty.
          key: model-cache-${{ hashFiles('model_cache/**') }}
          restore-keys: |
            model-cache-
          enableCrossOsArchive: true

      # Download all models fails, if there is a missing model that can't be downloaded.
      - name: Download models from Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          TABPFN_TOKEN: ${{ secrets.TABPFN_TOKEN }}
        run: uv run --no-sync python scripts/download_all_models.py

      - name: Check for forbidden licenses
        if: runner.os == 'MacOS' && matrix.python-version == '3.9'
        shell: bash
        run: |
          uv run --no-sync licensecheck \
            --requirements-paths pyproject.toml \
            --only-licenses APACHE MIT BSD ISC PYTHON UNLICENSE UNKNOWN \
            --ignore-packages certifi "tabpfn*" \
            --show-only-failing \
            -0

      - name: Run Tests (Unix)
        if: runner.os != 'Windows'
        env:
          TABPFN_EXCLUDE_DEVICES: mps
        run: |
          FAST_TEST_MODE=1 uv run --no-sync pytest tests/

      - name: Run Tests (Windows)
        if: runner.os == 'Windows'
        run: |
          $env:FAST_TEST_MODE = 1
          uv run --no-sync pytest tests/

      - name: Save model cache
        if: github.ref == 'refs/heads/main'
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ github.workspace }}/model_cache
          key: model-cache-${{ hashFiles('model_cache/**') }}
          enableCrossOsArchive: true
